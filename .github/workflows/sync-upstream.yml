name: Sync upstream

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 9 AM UTC
  workflow_dispatch: # allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/divyavenn/inklink.git || true
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

      - name: Sync from upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OUR_COMMIT=$(git rev-parse HEAD)

          # Overwrite everything from upstream (no merge, no conflicts)
          git checkout upstream/main -- .

          # Restore our chapters, workflows, and info.json (the only things we keep)
          git checkout $OUR_COMMIT -- chapters/ .github/workflows/ info.json

          git add -A

          # Only proceed if there are actual changes
          if git diff --cached --quiet; then
            echo "Already up to date."
            exit 0
          fi

          git commit -m "sync: update from upstream inklink"
          git push origin main
